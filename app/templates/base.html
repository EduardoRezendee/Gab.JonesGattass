<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gabinete Desa. Clarice Claudino da Silva{% endblock %}</title>

  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  

  <!-- Adicione este script no seu template -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>

    <!-- Link para Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Select2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- Bootstrap Datepicker CSS & JS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/locales/bootstrap-datepicker.pt-BR.min.js"></script>
  
 <!-- Custom CSS for Select2 Accessibility Theme -->
 <style>
  .select2-container--default .select2-selection--multiple,
  .select2-container--default .select2-selection--single {
      background-color: #f8f9fa;
      color: #495057;
      border: 1px solid #ced4da;
  }
  
  .select2-container--default .select2-selection__placeholder {
      color: #6c757d;
  }

  .select2-container--default .select2-results__option {
      background-color: #ffffff;
      color: #495057;
  }

  .select2-container--default .select2-results__option--highlighted[aria-selected] {
      background-color: #e9ecef;
      color: #212529;
  }

  .select2-container--default .select2-selection__choice {
      background-color: #e9ecef !important;
      color: #495057 !important;
      border: none;
      padding: 2px 5px;
      margin: 2px;
      border-radius: 3px;
  }

  
  .select2-container--open {
      z-index: 2050 !important; 
  }
</style>
</head>

<body>
  {% include 'components/_header.html' %}

  <div class="container-fluid">
    {% if user.is_authenticated %}
      {% include 'components/_sidebar.html' %}
    {% endif %}
    <div class="col py-4">
      <div class="container mt-5">
        <main role="main">
          {% block content %}
          {% endblock %}
        </main>
      </div>
    </div>
  </div>

  <div id="modalID" class="modal fade" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
          <div class="modal-content">
              <div class="modal-header">
                  <h5 class="modal-title" id="exampleModalLabel">Modal com Select2</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar" aria-label="Fechar modal"></button>
              </div>
              <div class="modal-body">
                  <form role="form" aria-labelledby="exampleModalLabel">
                      <div class="mb-3">
                          <label for="exampleSelect" class="form-label">Selecionar Responsáveis</label>
                          <select id="exampleSelect" class="form-control select2-modal" multiple="multiple" aria-describedby="responsaveisDescricao">
                              <option value="1">Opção 1</option>
                              <option value="2">Opção 2</option>
                              <option value="3">Opção 3</option>
                          </select>
                          <small id="responsaveisDescricao" class="form-text text-muted">Escolha os responsáveis pelo projeto.</small>
                      </div>
                  </form>
              </div>
              <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" aria-label="Fechar">Fechar</button>
                  <button type="button" class="btn btn-primary" aria-label="Salvar mudanças">Salvar</button>
              </div>
          </div>
      </div>
  </div>

  {% include 'components/_footer.html' %}

  
  <script>
    $(document).ready(function () {
        
        $('.datepicker').datepicker({
            format: 'dd/mm/yyyy',
            language: 'pt-BR',
            autoclose: true,
            todayHighlight: true
        });

        
        $('.select2').select2({
            placeholder: "Selecione os responsáveis",
            allowClear: true
        });

        
        $('.select2-modal').select2({
            placeholder: "Selecione os responsáveis",
            allowClear: true,
            dropdownParent: $('#modalID') 
        });
    });
  </script> 
</html>
