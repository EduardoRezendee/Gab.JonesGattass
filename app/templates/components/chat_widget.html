<!-- CSS for Floating Chatbot -->
<style>
  .chat-widget-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #083464, #1E3A8A);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 1050;
    font-size: 24px;
    transition: transform 0.2s;
  }
  .chat-widget-btn:hover {
    transform: scale(1.1);
  }
  .chat-box {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 450px;     /* Aumentado de 350px para 450px */
    height: 650px;    /* Aumentado de 500px para 650px */
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: none;
    flex-direction: column;
    z-index: 1050;
    overflow: hidden;
  }
  .chat-header {
    background: linear-gradient(135deg, #083464, #1E3A8A);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 1.15rem; /* Fonte do cabeçalho um pouco maior */
  }
  .chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #f9f9f9;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg-bubble {
    padding: 12px 18px;
    border-radius: 15px;
    max-width: 85%;
    font-size: 1.05rem; /* Aumentado de 0.9rem */
    line-height: 1.5;
  }
  .msg-ai {
    background: #e2e8f0;
    color: #1e293b;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
  }
  .msg-user {
    background: #083464;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .chat-input-area {
    padding: 10px;
    border-top: 1px solid #ddd;
    display: flex;
    gap: 10px;
    background: white;
  }
  .chat-input-area input {
    flex: 1;
    border: 1px solid #ccc;
    border-radius: 20px;
    padding: 10px 15px;
    outline: none;
    font-size: 1.05rem; /* Fonte de digitação maior */
  }
  .chat-input-area button {
    background: #083464;
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .loader {
    display: none;
    align-self: flex-start;
    padding: 10px;
  }
  .dot-pulse {
    position: relative;
    left: -9999px;
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background-color: #94a3b8;
    color: #94a3b8;
    box-shadow: 9999px 0 0 -5px;
    animation: dot-pulse 1.5s infinite linear;
    animation-delay: 0.25s;
  }
  .dot-pulse::before, .dot-pulse::after {
    content: "";
    display: inline-block;
    position: absolute;
    top: 0;
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background-color: #94a3b8;
    color: #94a3b8;
  }
  .dot-pulse::before {
    box-shadow: 9984px 0 0 0;
    animation: dot-pulse-before 1.5s infinite linear;
    animation-delay: 0s;
  }
  .dot-pulse::after {
    box-shadow: 10014px 0 0 0;
    animation: dot-pulse-after 1.5s infinite linear;
    animation-delay: 0.5s;
  }
  @keyframes dot-pulse-before {
    0% { box-shadow: 9984px 0 0 -5px; }
    30% { box-shadow: 9984px 0 0 2px; }
    60%, 100% { box-shadow: 9984px 0 0 -5px; }
  }
  @keyframes dot-pulse {
    0% { box-shadow: 9999px 0 0 -5px; }
    30% { box-shadow: 9999px 0 0 2px; }
    60%, 100% { box-shadow: 9999px 0 0 -5px; }
  }
  @keyframes dot-pulse-after {
    0% { box-shadow: 10014px 0 0 -5px; }
    30% { box-shadow: 10014px 0 0 2px; }
    60%, 100% { box-shadow: 10014px 0 0 -5px; }
  }
</style>

<!-- Floating Button -->
<div class="chat-widget-btn" onclick="toggleChat()">
  <i class="bi bi-robot"></i>
</div>

<!-- Chat Interface -->
<div class="chat-box" id="aiChatBox">
  <div class="chat-header">
    Consultor de Jurisprudência (JG)
    <i class="bi bi-x-lg" style="cursor: pointer;" onclick="toggleChat()"></i>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg-bubble msg-ai">
      Olá! Sou o assistente do gabinete. Posso ajudar a consultar o banco de acórdãos. O que deseja saber?
    </div>
    <!-- Loader -->
    <div class="loader" id="chatLoader">
      <div class="dot-pulse"></div>
    </div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="Faça sua pergunta..." onkeypress="handleKeyPress(event)">
    <button onclick="sendChatMessage()">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>
</div>

<script>
  function toggleChat() {
    const box = document.getElementById('aiChatBox');
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  }

  function handleKeyPress(e) {
    if (e.key === 'Enter') {
      sendChatMessage();
    }
  }

  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const question = input.value.trim();
    if (!question) return;

    // Add User Message
    addMessage(question, 'user');
    input.value = '';

    // Show Loader
    const loader = document.getElementById('chatLoader');
    loader.style.display = 'block';
    scrollToBottom();

    try {
      // Pega o token CSRF da página (Django)
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]') ? 
                        document.querySelector('[name=csrfmiddlewaretoken]').value : '';

      const response = await fetch('/api/chat-ia/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ question: question })
      });

      const data = await response.json();
      loader.style.display = 'none';

      if (data.response) {
         // Converte quebras de linha em <br> para HTML
         addMessage(data.response.replace(/\n/g, '<br>'), 'ai');
      } else {
         addMessage('Desculpe, ocorreu um erro na resposta.', 'ai');
      }
    } catch (err) {
      console.error(err);
      loader.style.display = 'none';
      addMessage('Erro de conexão ao servidor.', 'ai');
    }
  }

  function addMessage(text, role) {
    const messagesDiv = document.getElementById('chatMessages');
    const loader = document.getElementById('chatLoader');
    
    const msgDiv = document.createElement('div');
    msgDiv.className = role === 'user' ? 'msg-bubble msg-user' : 'msg-bubble msg-ai';
    msgDiv.innerHTML = text;
    
    // Insere antes do loader para manter o loader sempre por último
    messagesDiv.insertBefore(msgDiv, loader);
    scrollToBottom();
  }

  function scrollToBottom() {
    const messagesDiv = document.getElementById('chatMessages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
</script>
