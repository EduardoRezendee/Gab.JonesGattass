{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <!-- Título centralizado com divisor -->
    <div class="text-center mb-4">
        <h2 class="display-6">Alterar Senha</h2>
        <hr class="w-50 mx-auto">
        <p class="text-muted">Preencha os campos abaixo para alterar sua senha</p>
    </div>

    <!-- Card para formulário de troca de senha -->
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <form method="post" class="needs-validation" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_old_password" class="form-label">Senha Atual</label>
                            <div class="input-group">
                                {{ form.old_password }}
                                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_old_password">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="id_new_password1" class="form-label">Nova Senha</label>
                            <div class="input-group">
                                {{ form.new_password1 }}
                                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_new_password1">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <small class="form-text text-muted">
                                A senha deve conter pelo menos 8 caracteres, incluindo letras e números.
                            </small>
                        </div>
                        <div class="mb-3">
                            <label for="id_new_password2" class="form-label">Confirme a Nova Senha</label>
                            <div class="input-group">
                                {{ form.new_password2 }}
                                <button type="button" class="btn btn-outline-secondary toggle-password" data-target="id_new_password2">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="bi bi-save"></i> Alterar Senha
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Link para voltar -->
    <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Voltar
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePasswordButtons = document.querySelectorAll('.toggle-password');
        
        togglePasswordButtons.forEach(button => {
            button.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const targetInput = document.getElementById(targetId);
                
                if (targetInput.type === 'password') {
                    targetInput.type = 'text';
                    this.querySelector('i').classList.remove('bi-eye');
                    this.querySelector('i').classList.add('bi-eye-slash');
                } else {
                    targetInput.type = 'password';
                    this.querySelector('i').classList.remove('bi-eye-slash');
                    this.querySelector('i').classList.add('bi-eye');
                }
            });
        });
    });
</script>
{% endblock %}
