<!-- seu_app/templates/seu_app/importar_processos.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Importar Processos via CSV</h2>

    {% if messages %}
    <div class="alert alert-info">
        {% for message in messages %}
            <p class="{{ message.tags }}">{{ message }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label for="arquivo">Selecione um arquivo CSV (.csv):</label>
            <input type="file" name="arquivo" class="form-control" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Importar Processos</button>
    </form>
</div>
{% endblock %}
