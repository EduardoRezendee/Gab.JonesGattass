{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <!-- Título e Divisor -->
    <div class="mb-4">
        <h1 class="fw-bold" style="color: #083464; font-size: 1.5rem;">
            <i class="bi bi-pencil-square me-2"></i> Editar Processo
        </h1>
        <hr style="height: 2px; background-color: #2f2f2f; border: none; width: 50%;">
    </div>

    <!-- Card do Formulário -->
    <div class="card shadow-sm border-0" style="border-radius: 12px;">
        <div class="card-body" style="background-color: #f8f9fa; padding: 20px;">
            <form method="post" class="form">
                {% csrf_token %}
                <div class="row g-3">
                    {% for field in form %}
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="{{ field.id_for_label }}" class="form-label fw-semibold" style="color: #083464;">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors }}
                            </div>
                            {% endif %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="mt-4 text-end">
                    <button type="submit" class="btn text-white shadow-sm" style="background-color: #106e0c; border-color: #0cb826;">
                        <i class="bi bi-save me-1"></i> Atualizar Processo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Botão Cancelar -->
    <div class="mt-3 text-end">
        <a href="{% url 'processo_list' %}" class="btn btn-outline-secondary shadow-sm">
            <i class="bi bi-arrow-left-circle me-1"></i> Cancelar e voltar para a lista
        </a>
    </div>
</div>

{% endblock %}
