<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Upload de Base de Conhecimento (Jurisprudência)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="container mt-3"> 
        <!-- Formulário de Upload -->
        <form id="upload-form" method="post" enctype="multipart/form-data" class="mt-3">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_nome" class="form-label">Nome do Documento:</label>
                <input type="text" name="nome" id="id_nome" class="form-control" placeholder="Digite um nome">
            </div>

            <div class="mb-3">
                <label for="id_arquivo" class="form-label">Escolha um Arquivo:</label>
                <input type="file" name="arquivo" id="id_arquivo" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar Arquivo</button>
        </form>
        <!-- Lista de Documentos Enviados -->
        <h5 class="mt-4">Base de Conhecimento Enviada</h5>
        <div class="document-list border p-3 rounded bg-light">
            <ul id="document-list" class="list-group">
                {% for doc in documentos %}
                <li class="list-group-item d-flex justify-content-between align-items-center" data-id="{{ doc.id }}">
                    <a href="{{ doc.arquivo.url }}" target="_blank">{{ doc.nome }}</a>
                    <button class="btn btn-danger btn-sm" onclick="deleteDocument({{ doc.id }})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </li>
                {% empty %}
                <li class="list-group-item text-muted">Nenhum documento enviado ainda.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
    <script>
        function deleteDocument(docId) {
            fetch(`/deletar-base/${docId}/`, {
                method: "DELETE",
                headers: {
                    "X-CSRFToken": "{{ csrf_token }}",  // CSRF token para segurança
                    "Content-Type": "application/json"  // Define o tipo de conteúdo
                }
            })
            .then(response => {
                if (response.ok) {
                    // Remove o item da lista
                    document.querySelector(`li[data-id="${docId}"]`).remove();
                } else {
                    alert("Erro ao deletar o documento.");
                }
            })
            .catch(error => {
                console.error("Erro:", error);
            });
        }
    </script>
</body>
</html>
