<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="modal fade show d-block" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-light">
                <div class="modal-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <textarea name="texto" id="id_texto" class="form-control" rows="10">{{ form.texto.value }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar Configuração</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fecharModal() {
            document.querySelector('.modal').classList.remove('show', 'd-block');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
