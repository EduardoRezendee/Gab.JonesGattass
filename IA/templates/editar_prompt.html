<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configurar Prompt do Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Configurar Prompt do Chatbot</h2>

        <form method="post" class="shadow p-4 rounded bg-light">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_texto" class="form-label">Prompt Personalizado:</label>
                {{ form.texto }}  <!-- 🔹 Agora o Django renderiza corretamente -->
            </div>

            <button type="submit" class="btn btn-primary w-100">Salvar Configuração</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
