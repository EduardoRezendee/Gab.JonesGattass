<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Configurar Prompt do Chatbot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-8">

        <form method="post" class="mt-8">
            {% csrf_token %}
            <div class="mb-2">
                <label for="id_texto" class="form-label">Prompt Personalizado:</label>
                <textarea name="texto" id="id_texto" class="form-control" rows="12" placeholder="Digite o prompt do chatbot...">{{ form.texto.value }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Salvar Configuração</button>
        </form>
    </div>
</body>
</html>
